<!DOCTYPE html>
<html>
<head>
    <title>ESP32-C3 Smart Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #00d4ff; --danger: #ff4d4d; --freeze: #ffcc00; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; width: 380px; border: 1px solid #333; transition: 0.3s; }
        .frozen { border: 1px solid var(--freeze); box-shadow: 0 0 10px rgba(255, 204, 0, 0.2); }
        
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; margin-bottom: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 34px; }
        input:checked + .slider { background-color: var(--accent); }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(26px); }

        canvas { max-width: 100%; height: 220px; }
        .btn { border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 85%; transition: 0.2s; }
        .btn-export { background: var(--accent); color: black; }
        .btn-stop { background: var(--danger); color: white; margin-top: 15px; }
        .btn-resume { background: #22c55e; color: white; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <h1>Sensory Command Center</h1>
    
    <div>
        <h3>System Power</h3>
        <label class="switch">
            <input type="checkbox" id="mainSwitch" onchange="toggleSystem(this)">
            <span class="slider"></span>
        </label>
        <h2 id="statusText" style="color: #ff4d4d;">SYSTEM OFF</h2>
    </div>

    <div id="dashboard" class="container" style="display:none;">
        <div class="card" id="card1">
            <h3>Environment Data</h3>
            <canvas id="tempHumChart"></canvas>
        </div>
        <div class="card" id="card2">
            <h3>Gas Levels (PPM)</h3>
            <canvas id="gasChart"></canvas>
        </div>
        <div class="card" id="card3">
            <h3>Quick Stats <span id="freezeTag" style="color:var(--freeze); display:none;">(FROZEN)</span></h3>
            <p>Temp: <span id="tVal" style="color:#ff4d4d">--</span> °C</p>
            <p>Humidity: <span id="hVal" style="color:#00d4ff">--</span> %</p>
            <p>Gas: <span id="gVal" style="color:#ffcc00">--</span> ppm</p>
            
            <button class="btn btn-export" onclick="location.href='/download'">Download History (CSV)</button>
            <button class="btn btn-stop" id="stopBtn" onclick="freezeUI()">STOP MONITORING (FREEZE)</button>
            <button class="btn btn-resume" id="resumeBtn" onclick="resumeUI()">RESUME MONITORING</button>
        </div>
    </div>

    <script>
        let isUIFrozen = false;
        let dataTimer = null;
        
        // Temperature (Left) & Humidity (Right) Chart
        const chartTH = new Chart(document.getElementById('tempHumChart').getContext('2d'), { 
            type: 'line', 
            data: { labels: [], datasets: [
                { label: 'Temp (°C)', borderColor: '#ff4d4d', data: [], tension: 0.4, yAxisID: 'y' },
                { label: 'Hum (%)', borderColor: '#00d4ff', data: [], tension: 0.4, yAxisID: 'y1' }
            ]}, 
            options: { 
                animation: false, 
                scales: {
                    y: { // Left Axis for Temp
                        type: 'linear', display: true, position: 'left',
                        suggestedMin: 0, suggestedMax: 45,
                        title: { display: true, text: 'Celsius (°C)', color: '#ff4d4d' }
                    },
                    y1: { // Right Axis for Humidity
                        type: 'linear', display: true, position: 'right',
                        suggestedMin: 0, suggestedMax: 100,
                        grid: { drawOnChartArea: false }, // Only show grid for left axis
                        title: { display: true, text: 'Humidity (%)', color: '#00d4ff' }
                    }
                }
            } 
        });

        // Gas Chart in PPM
        const chartGas = new Chart(document.getElementById('gasChart').getContext('2d'), { 
            type: 'line', 
            data: { labels: [], datasets: [
                { label: 'Gas (PPM)', borderColor: '#ffcc00', data: [], fill: true, backgroundColor: 'rgba(255, 204, 0, 0.1)' }
            ]}, 
            options: { 
                animation: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        title: { display: true, text: 'PPM', color: '#ffcc00' }
                    }
                }
            } 
        });

        function toggleSystem(el) {
            const dash = document.getElementById('dashboard');
            const status = document.getElementById('statusText');
            if (el.checked) {
                dash.style.display = "flex";
                status.innerText = "SYSTEM ON";
                status.style.color = "#00ff88";
                resumeUI();
            } else {
                dash.style.display = "none";
                status.innerText = "SYSTEM OFF";
                status.style.color = "#ff4d4d";
                stopPolling();
            }
            fetch(`/update?state=${el.checked ? 1 : 0}`);
        }

        function freezeUI() {
            isUIFrozen = true;
            stopPolling();
            document.querySelectorAll('.card').forEach(c => c.classList.add('frozen'));
            document.getElementById('freezeTag').style.display = "inline";
            document.getElementById('stopBtn').style.display = "none";
            document.getElementById('resumeBtn').style.display = "inline-block";
        }

        function resumeUI() {
            isUIFrozen = false;
            startPolling();
            document.querySelectorAll('.card').forEach(c => c.classList.remove('frozen'));
            document.getElementById('freezeTag').style.display = "none";
            document.getElementById('stopBtn').style.display = "inline-block";
            document.getElementById('resumeBtn').style.display = "none";
        }

        function startPolling() {
            if (dataTimer) clearInterval(dataTimer);
            dataTimer = setInterval(fetchData, 2000);
        }

        function stopPolling() {
            clearInterval(dataTimer);
            dataTimer = null;
        }

        function fetchData() {
            if(isUIFrozen) return;
            fetch('/readings').then(res => res.json()).then(data => {
                const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                document.getElementById('tVal').innerText = data.temp;
                document.getElementById('hVal').innerText = data.hum;
                document.getElementById('gVal').innerText = data.gas;

                [chartTH, chartGas].forEach(c => {
                    if(c.data.labels.length > 15) { c.data.labels.shift(); c.data.datasets.forEach(d => d.data.shift()); }
                    c.data.labels.push(now);
                });

                chartTH.data.datasets[0].data.push(data.temp);
                chartTH.data.datasets[1].data.push(data.hum);
                chartGas.data.datasets[0].data.push(data.gas);
                chartTH.update();
                chartGas.update();
            });
        }
    </script>
</body>
</html>  this is the webpage code
